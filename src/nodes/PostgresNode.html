<script type="text/x-red" data-template-name="PostgresNode">
  <div class="form-row">
    <label for="node-input-name">
      <i class="icon-tag"></i>
      <span data-i18n="postgrestor.label.name"></span>
    </label>
    <input type="text" id="node-input-name" data-i18n="[placeholder]node-red:common.label.name"> </div>
  <div class="form-row">
    <label for="node-input-PostgresDBNode">
      <i class="fa fa-server"></i>
      <span data-i18n="postgrestor.label.server"></span>
    </label>
    <input type="text" id="node-input-PostgresDBNode">
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-throwErrors" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-throwErrors">
      <span data-i18n="postgrestor.label.throwErrors">Throw Exception</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-useNamedParams" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-useNamedParams">
      <span data-i18n="postgrestor.label.useNamedParams">Named Parameters</span>
    </label>
  </div>
  <div class="form-row">
    <label for="node-input-queryTimeout">
      <i class="fa fa-clock-o"></i>
      <span data-i18n="postgrestor.label.queryTimeout">Query Timeout (ms)</span>
    </label>
    <input type="text" id="node-input-queryTimeout" style="width: 70%;">
    <input type="hidden" id="node-input-queryTimeoutFieldType">
  </div>
  <div class="form-row">
    <label><span data-i18n="postgrestor.section.typeMapping">Type Mapping</span></label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-mapNumeric" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-mapNumeric">
      <span data-i18n="postgrestor.label.mapNumeric">Map numeric → number</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-mapTimestamptz" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-mapTimestamptz">
      <span data-i18n="postgrestor.label.mapTimestamptz">Map timestamptz → ISO 8601</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-parseJsonb" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-parseJsonb">
      <span data-i18n="postgrestor.label.parseJsonb">Parse jsonb → object</span>
    </label>
  </div>
  <div class="form-row" style="position: relative; margin-bottom: 0px;">
    <label for="node-input-query">
      <i class="fa fa-file-code-o"></i>
      <span data-i18n="postgrestor.label.query"></span>
    </label>
    <input type="hidden" id="node-input-query" autofocus="autofocus"> </div>
  <div class="form-row node-text-editor-row">
    <div style="height: 300px; min-height: 150px;" class="node-text-editor" id="node-input-editor"></div>
  </div>
</script>
<script type="text/javascript">
  RED.nodes.registerType("PostgresNode", {
    category: "storage",
    color: 'rgb(5, 93, 193)',
    defaults: {
      name: {
        value: ""
      },
      query: {
        value: "SELECT * FROM ;"
      },
      PostgresDBNode: {
        type: "PostgresDBNode",
        required: true
      },
      outputs: {
        value: 1
      },
      throwErrors: {
        value: false,
      },
      useNamedParams: {
        value: false,
      },
      queryTimeout: {
        value: 0,
      },
      queryTimeoutFieldType: {
        value: "num",
      },
      mapNumeric: {
        value: false,
      },
      mapTimestamptz: {
        value: false,
      },
      parseJsonb: {
        value: true,
      }
    },
    inputs: 1,
    icon: "sql.png",
    iconStyle: "red-node-icon sql",
    align: "left",
    label: function () {
      return this.name || "query";
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      $("#node-input-throwErrors").prop("checked", this.throwErrors);
      $("#node-input-useNamedParams").prop("checked", this.useNamedParams);

      this.editor = RED.editor.createEditor({
        id: 'node-input-editor',
        mode: 'ace/mode/sql',
        value: $("#node-input-query").val(),
        options: {
          showLineNumbers: true,
          wrap: true,
          useWorker: false,
          maxLines: Infinity,
          fontSize: 14,
          enableBasicAutocompletion: true,
          enableLiveAutocompletion: true,
        }
      });
      this.editor.focus();

      // Initialize type mapping checkbox states from current config
      $("#node-input-mapNumeric").prop("checked", this.mapNumeric === true || this.mapNumeric === 'true');
      $("#node-input-mapTimestamptz").prop("checked", this.mapTimestamptz === true || this.mapTimestamptz === 'true');
      $("#node-input-parseJsonb").prop("checked", this.parseJsonb !== false && this.parseJsonb !== 'false');

      // Initialize queryTimeout typedInput
      if (this.queryTimeoutFieldType === undefined || this.queryTimeoutFieldType === '') {
        this.queryTimeoutFieldType = 'num';
      }
      $("#node-input-queryTimeout").typedInput({
        type: this.queryTimeoutFieldType || 'num',
        types: ['num', 'flow', 'global'],
        typeField: "#node-input-queryTimeoutFieldType"
      });
    },
    oneditsave: function () {
      $("#node-input-query").val(this.editor.getValue());
      delete this.editor;
    }
  });
</script>
