<script type="text/x-red" data-template-name="PostgresNode">
  <div class="form-row">
    <label for="node-input-name">
      <i class="icon-tag"></i>
      <span data-i18n="postgres.label.name"></span>
    </label>
    <input type="text" id="node-input-name" data-i18n="[placeholder]node-red:common.label.name"> </div>
  <div class="form-row">
    <label for="node-input-PostgresDBNode">
      <i class="fa fa-server"></i>
      <span data-i18n="postgres.label.server"></span>
    </label>
    <input type="text" id="node-input-PostgresDBNode">
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-throwErrors" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-throwErrors">
      <span data-i18n="postgres.label.throwErrors">Throw Exception</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-useNamedParams" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-useNamedParams">
      <span data-i18n="postgres.label.useNamedParams">Named Parameters</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-transactionMode" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-transactionMode">
      <span data-i18n="postgres.label.transactionMode">Transaction Mode</span>
    </label>
  </div>
  <div class="form-row">
    <label><span data-i18n="postgres.section.advanced">Advanced</span></label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-cursorMode" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-cursorMode">
      <span data-i18n="postgres.label.cursorMode">Cursor Mode</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-copyMode" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-copyMode">
      <span data-i18n="postgres.label.copyMode">COPY Mode</span>
    </label>
  </div>
  <div class="form-row">
    <input type="checkbox" id="node-input-retryEnabled" style="display: inline-block; width: auto; vertical-align: top;">
    <label for="node-input-retryEnabled">
      <span data-i18n="postgres.label.retryEnabled">Retry on Transient Errors</span>
    </label>
  </div>
  <div class="form-row">
    <label for="node-input-queryTimeout">
      <i class="fa fa-clock-o"></i>
      <span data-i18n="postgres.label.queryTimeout">Query Timeout (ms)</span>
    </label>
    <input type="text" id="node-input-queryTimeout" style="width: 70%;">
    <input type="hidden" id="node-input-queryTimeoutFieldType">

  <div class="form-row">

    <input type="hidden" id="node-input-cursorBatchSizeFieldType">

      <span data-i18n="postgres.label.mapNumeric">Map numeric → number</span>
    </label>
  </div>

    <input type="checkbox" id="node-input-mapTimestamptz" style="display: inline-block; width: auto; vertical-align: top;">

      <i class="fa fa-file-code-o"></i>
      <span data-i18n="postgres.label.query"></span>
    </label>

    <div style="height: 300px; min-height: 150px;" class="node-text-editor" id="node-input-editor"></div>
  </div>

<script type="text/javascript">
  RED.nodes.registerType("PostgresNode", {
    category: "storage",
    color: 'rgb(5, 93, 193)',
    defaults: {
      name: {
        value: ""
      },
      query: {
        value: "SELECT * FROM ;"
      },
      PostgresDBNode: {
        type: "PostgresDBNode",
        required: true
      },
      outputs: {
        value: 1
      },
      throwErrors: {
        value: false,
      },
      useNamedParams: {
        value: false,
      },
      queryTimeout: {
        value: 0,
      },
      queryTimeoutFieldType: {
        value: "num",
      },
      mapNumeric: {
        value: false,
      },
      mapTimestamptz: {
        value: false,
      },
      parseJsonb: {
        value: true,
      },
      transactionMode: {
        value: false,
      },
      cursorMode: {
        value: false,
      },
      copyMode: {
        value: false,
      },
      cursorBatchSize: {
        value: 100,
      },
      cursorBatchSizeFieldType: {
        value: "num",
      },
      retryEnabled: {
        value: false,
      },
      maxRetries: {
        value: 3,
      },
      maxRetriesFieldType: {
        value: "num",
      },
      retryBaseDelay: {
        value: 100,
      },
      retryBaseDelayFieldType: {
        value: "num",
      }
    },
    inputs: 1,
    icon: "sql.png",
    iconStyle: "red-node-icon sql",
    align: "left",
    label: function () {
      return this.name || "query";
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      $("#node-input-throwErrors").prop("checked", this.throwErrors);
      $("#node-input-useNamedParams").prop("checked", this.useNamedParams);

      this.editor = RED.editor.createEditor({
        id: 'node-input-editor',
        mode: 'ace/mode/sql',
        value: $("#node-input-query").val(),
        options: {
          showLineNumbers: true,
          wrap: true,
          useWorker: false,
          maxLines: Infinity,
          fontSize: 14,
          enableBasicAutocompletion: true,
          enableLiveAutocompletion: true,
        }
      });
      this.editor.focus();

      // Initialize type mapping checkbox states from current config
      $("#node-input-mapNumeric").prop("checked", this.mapNumeric === true || this.mapNumeric === 'true');
      $("#node-input-mapTimestamptz").prop("checked", this.mapTimestamptz === true || this.mapTimestamptz === 'true');
      $("#node-input-parseJsonb").prop("checked", this.parseJsonb !== false && this.parseJsonb !== 'false');
      $("#node-input-transactionMode").prop("checked", this.transactionMode === true || this.transactionMode === 'true');

      // Initialize queryTimeout typedInput
      if (this.queryTimeoutFieldType === undefined || this.queryTimeoutFieldType === '') {
        this.queryTimeoutFieldType = 'num';
      }
      $("#node-input-queryTimeout").typedInput({
        type: this.queryTimeoutFieldType || 'num',
        types: ['num', 'flow', 'global'],
        typeField: "#node-input-queryTimeoutFieldType"
      });

      $("#node-input-cursorMode").prop("checked", this.cursorMode === true || this.cursorMode === 'true');
      $("#node-input-copyMode").prop("checked", this.copyMode === true || this.copyMode === 'true');
      $("#node-input-retryEnabled").prop("checked", this.retryEnabled === true || this.retryEnabled === 'true');

      $("#node-input-cursorBatchSize").typedInput({
        type: this.cursorBatchSizeFieldType || 'num',
        types: ['num', 'flow', 'global'],
        typeField: "#node-input-cursorBatchSizeFieldType"
      });
      $("#node-input-maxRetries").typedInput({
        type: this.maxRetriesFieldType || 'num',
        types: ['num', 'flow', 'global'],
        typeField: "#node-input-maxRetriesFieldType"
      });
      $("#node-input-retryBaseDelay").typedInput({
        type: this.retryBaseDelayFieldType || 'num',
        types: ['num', 'flow', 'global'],
        typeField: "#node-input-retryBaseDelayFieldType"
      });
    },
    oneditsave: function () {
      $("#node-input-query").val(this.editor.getValue());
      delete this.editor;
    }
  });
</script>
<script type="text/x-red" data-help-name="PostgresNode">
    <h3>PostgresNode — PostgreSQL Query</h3>
    <p>Executes SQL queries against a PostgreSQL database using parameterized templates. Supports Mustache templating, named parameters, transactions, cursor streaming, COPY import/export, and automatic retry on transient errors.</p>
    <h4>Connection</h4>
    <dl>
      <dt><b>Name</b></dt><dd>Label for this node in the flow.</dd>
      <dt><b>Server</b></dt><dd>Select a PostgresDBNode that defines the database connection.</dd>
    </dl>
    <h4>Execution Modes</h4>
    <dl>
      <dt><b>Throw Exception</b></dt><dd>ON: SQL errors halt the flow. OFF: errors attached to <code>msg.error</code> and message continues downstream.</dd>
      <dt><b>Named Parameters</b></dt><dd>When ON, <code>msg.params</code> is a key-value object (<code>{id: 42, name: "Alice"}</code>) bound to <code>$1, $2</code> in insertion order. Mustache renders first, then params bind.</dd>
      <dt><b>Transaction Mode</b></dt><dd>When ON, <code>msg.payload</code> must be an array of <code>{query, params, output}</code> objects. All execute atomically within <code>BEGIN/COMMIT</code>. On failure: auto-<code>ROLLBACK</code>. First <code>output: true</code> determines <code>msg.payload.rows</code>.</dd>
      <dt><b>Cursor Mode</b></dt><dd>Streams large <code>SELECT</code> results in batches via PostgreSQL <code>DECLARE/FETCH</code>. Each batch emits a separate message: <code>{payload: [...rows], batch: {index, rows, total}}</code>. Final message: <code>{payload: [], complete: true, total: N}</code>. Non-SELECT queries ignored.</dd>
      <dt><b>COPY Mode</b></dt><dd>High-performance CSV import/export via PostgreSQL COPY protocol. <code>COPY FROM STDIN</code> sends <code>msg.payload</code> as CSV. <code>COPY TO STDOUT</code> returns CSV as string.</dd>
      <dt><b>Retry on Transient Errors</b></dt><dd>Auto-retries on deadlock (40P01), serialization failure (40001), connection resets. Uses jittered exponential backoff. Does NOT apply to Cursor or COPY mode.</dd>
    </dl>
    <h4>Limits</h4>
    <dl>
      <dt><b>Query Timeout (ms)</b></dt><dd>Per-query timeout. 0 = no timeout. Overrides the pool's statement_timeout. Reset in finally block.</dd>
      <dt><b>Cursor Batch Size</b></dt><dd>Rows per <code>FETCH</code> in Cursor Mode (default: 100).</dd>
      <dt><b>Max Retries</b></dt><dd>Max retry attempts before propagating error (default: 3).</dd>
      <dt><b>Retry Base Delay (ms)</b></dt><dd>Base delay for backoff: <code>min(5000, base × 2^attempt) × random</code> (default: 100).</dd>
    </dl>
    <h4>Type Mapping</h4>
    <dl>
      <dt><b>Map numeric → number</b></dt><dd>Convert <code>NUMERIC</code> to JS number. Warning: precision loss for large values.</dd>
      <dt><b>Map timestamptz → ISO 8601</b></dt><dd>Convert <code>TIMESTAMPTZ</code> to ISO string. OFF: returns Date objects.</dd>
      <dt><b>Parse jsonb → object</b></dt><dd>Auto-parse <code>JSONB</code> columns. OFF: returns raw JSON strings.</dd>
    </dl>
    <h4>Query Editor</h4>
    <p>Write SQL with Mustache templates: <code>SELECT * FROM {{msg.table}}</code>. Renders with current <code>msg</code> as context. Prepared statements auto-managed via MD5-hashed names.</p>
    <p>Pass parameters via <code>msg.params</code> array for positional binding, or as object with Named Parameters ON.</p>
</script>
