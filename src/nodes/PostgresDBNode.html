<script type="text/x-red" data-template-name="PostgresDBNode">
  <div class="form-row">
    <label for="node-config-input-name">
      <i class="fa fa-tag"></i>
      <span data-i18n="postgres.label.name"></span>
    </label>
    <input type="text" id="node-config-input-name" data-i18n="[placeholder]postgres.placeholder.name">
  </div>
  <div class="form-row">
    <label for="node-config-input-throwErrors">
      <i class="fa fa-exclamation-triangle"></i>
      <span data-i18n="postgres.label.throwErrors">Throw Exception</span>
    </label>
    <input type="checkbox" id="node-config-input-throwErrors" data-i18n="[placeholder]postgres.placeholder.throwErrors">
    <input type="hidden" id="node-config-input-throwErrorsFieldType">
  </div>
  <div class="form-row">
    <ul style="background: #fff; min-width: 600px; margin-bottom: 20px;" id="postgrestor-config-tabs"></ul>
  </div>

  <div id="postgrestor-config-tabs-content" style="min-height: 170px;">
    <div id="postgrestor-config-tab-connection" style="display: none;">
      <div class="form-row">
        <label for="node-config-input-databaseSource">
          <i class="fa fa-link"></i>
          <span data-i18n="postgres.label.databaseSource"></span>
        </label>
        <div style="display: inline-block; vertical-align: top;">
          <input type="radio" id="postgrestor-dbsource-manual" name="databaseSource" value="manual" checked>
          <label for="postgrestor-dbsource-manual" data-i18n="postgres.databaseSource.manual" style="width: auto; display: inline;">Manual</label>
          <input type="radio" id="postgrestor-dbsource-url" name="databaseSource" value="url" style="margin-left: 12px;">
          <label for="postgrestor-dbsource-url" data-i18n="postgres.databaseSource.url" style="width: auto; display: inline;">DATABASE_URL</label>
        </div>
      </div>
      <div id="postgrestor-manual-fields">
        <div class="form-row">
          <label for="node-config-input-host">
            <i class="fa fa-server"></i>
            <span data-i18n="postgres.label.host"></span>
          </label>
          <input type="text" id="node-config-input-host" data-i18n="[placeholder]postgres.placeholder.host" style="width: 80%;">
          <input type="hidden" id="node-config-input-hostFieldType">
        </div>
        <div class="form-row">
          <label for="node-config-input-port">
            <i class="fa fa-plug"></i>
            <span data-i18n="postgres.label.port"></span>
          </label>
          <input type="text" id="node-config-input-port" data-i18n="[placeholder]postgres.placeholder.port" style="width: 80%;">
          <input type="hidden" id="node-config-input-portFieldType">
        </div>
        <div class="form-row">
          <label for="node-config-input-database">
            <i class="fa fa-database"></i>
            <span data-i18n="postgres.label.database"></span>
          </label>
          <input type="text" id="node-config-input-database" data-i18n="[placeholder]postgres.placeholder.database" style="width: 80%;">
          <input type="hidden" id="node-config-input-databaseFieldType">
        </div>
      </div>
      <div class="form-row" id="postgrestor-databaseUrl-row" style="display: none;">
        <label for="node-config-input-databaseUrl" data-i18n="[title]postgres.title.databaseUrl">
          <i class="fa fa-link"></i>
          <span data-i18n="postgres.label.databaseUrl"></span>
        </label>
        <input type="text" id="node-config-input-databaseUrl" data-i18n="[placeholder]postgres.placeholder.databaseUrl" style="width: 80%;">
        <input type="hidden" id="node-config-input-databaseUrlFieldType">
      </div>
      <div class="form-row">
        <label for="node-config-input-sslmode" data-i18n="[title]postgres.title.sslmode">
          <i class="fa fa-shield"></i>
          <span data-i18n="postgres.label.sslmode"></span>
        </label>
        <select id="node-config-input-sslmode" style="width: auto; min-width: 130px;">
          <option value="disable" data-i18n="postgres.sslmode.disable">disable</option>
          <option value="require" data-i18n="postgres.sslmode.require">require</option>
          <option value="verify-ca" data-i18n="postgres.sslmode.verify-ca">verify-ca</option>
          <option value="verify-full" data-i18n="postgres.sslmode.verify-full">verify-full</option>
        </select>
        <input type="hidden" id="node-config-input-sslmodeFieldType">
      </div>
      <div class="form-row" id="postgrestor-ssl-deprecated-row" style="display: none;">
        <label for="node-config-input-ssl" style="width: auto; margin-right: 72px;">
          <span data-i18n="postgres.label.sslDeprecated"></span>
        </label>
        <input type="checkbox" id="node-config-input-ssl" style="display: inline-block; width: auto; vertical-align: top;" disabled>
        <span style="color: #999; font-size: 0.85em; margin-left: 8px;" data-i18n="postgres.title.sslDeprecated"></span>
        <input type="hidden" id="node-config-input-sslFieldType">
      </div>
    </div>
    <div id="postgrestor-config-tab-security" style="display: none;">

      <div class="form-row">
        <label for="node-config-input-user">
          <i class="fa fa-user"></i>
          <span data-i18n="postgres.label.user"></span>
        </label>
        <input type="text" id="node-config-input-user" data-i18n="[placeholder]postgres.placeholder.user" style="width: 80%;">
      </div>

       <div class="form-row">
        <label for="node-config-input-password">
          <i class="fa fa-lock"></i>
          <span data-i18n="postgres.label.password"></span>
        </label>
        <input type="password" id="node-config-input-password" data-i18n="[placeholder]postgres.placeholder.password" style="width: 80%;">

      </div>

      <div id="postgrestor-ssl-cert-fields" style="display: none;">
        <div class="form-row">
          <label for="node-config-input-sslCa">
            <i class="fa fa-certificate"></i>
            <span data-i18n="postgres.label.sslCa"></span>
          </label>
          <textarea id="node-config-input-sslCa" data-i18n="[placeholder]postgres.placeholder.sslCa" style="width: 80%; height: 80px;"></textarea>
        </div>
        <div class="form-row">
          <label for="node-config-input-sslCert">
            <i class="fa fa-file-text"></i>
            <span data-i18n="postgres.label.sslCert"></span>
          </label>
          <textarea id="node-config-input-sslCert" data-i18n="[placeholder]postgres.placeholder.sslCert" style="width: 80%; height: 80px;"></textarea>
        </div>
        <div class="form-row">
          <label for="node-config-input-sslKey">
            <i class="fa fa-key"></i>
            <span data-i18n="postgres.label.sslKey"></span>
          </label>
          <textarea id="node-config-input-sslKey" data-i18n="[placeholder]postgres.placeholder.sslKey" style="width: 80%; height: 80px;"></textarea>
        </div>
      </div>

    </div>
    <div id="postgrestor-config-tab-pool" style="display: none;">
      <div class="form-row">
        <label data-i18n="[title]postgres.title.max" for="node-config-input-max" style="width: 150px;">
          <i class="fa fa-thermometer-full"></i>
          <span data-i18n="postgres.label.max"></span>
        </label>
        <input type="text" id="node-config-input-max" data-i18n="[placeholder]postgres.placeholder.max" style="width: 60%;">
        <input type="hidden" id="node-config-input-maxFieldType">
      </div>
      <div class="form-row">
        <label data-i18n="[title]postgres.title.min" for="node-config-input-min" style="width: 150px;">
          <i class="fa fa-thermometer-empty"></i>
          <span data-i18n="postgres.label.min"></span>
        </label>
        <input type="text" id="node-config-input-min" data-i18n="[placeholder]postgres.placeholder.min" style="width: 60%;">
        <input type="hidden" id="node-config-input-minFieldType">
      </div>
      <div class="form-row">
        <label for="node-config-input-idle" style="width: 150px;">
          <i class="fa fa-hourglass-half"></i>
          <span data-i18n="postgres.label.idle"></span>
        </label>
        <input type="text" id="node-config-input-idle" data-i18n="[placeholder]postgres.placeholder.idle" style="width: 60%;">
        <input type="hidden" id="node-config-input-idleFieldType">
      </div>
      <div class="form-row">
        <label for="node-config-input-connectionTimeout" style="width: 150px;">
          <i class="fa fa-hourglass-half"></i>
          <span data-i18n="postgres.label.connectionTimeout"></span>
        </label>
        <input type="text" id="node-config-input-connectionTimeout" data-i18n="[placeholder]postgres.placeholder.connectionTimeout" style="width: 60%;">
        <input type="hidden" id="node-config-input-connectionTimeoutFieldType">
      </div>
      <div class="form-row">
        <label for="node-config-input-statementTimeout" data-i18n="[title]postgres.title.statementTimeout" style="width: 150px;">
          <i class="fa fa-clock-o"></i>
          <span data-i18n="postgres.label.statementTimeout"></span>
        </label>
        <input type="text" id="node-config-input-statementTimeout" data-i18n="[placeholder]postgres.placeholder.statementTimeout" style="width: 60%;">
        <input type="hidden" id="node-config-input-statementTimeoutFieldType">
      </div>
    </div>
  </div>
</script>
<script type="text/javascript">
  RED.nodes.registerType('PostgresDBNode', {
    category: "config",
    color: "rgb(5, 93, 193)",
    defaults: {
      name: {
        value: ""
      },
      throwErrors: {
        value: true
      },
      throwErrorsFieldType: {
        value: "bool"
      },
      host: {
        value: "127.0.0.1",
        required: true
      },
      hostFieldType: {
        value: "str"
      },
      port: {
        value: 5432,
        required: true
      },
      portFieldType: {
        value: "num"
      },
      database: {
        value: "postgres",
        required: true
      },
      databaseFieldType: {
        value: "str"
      },
      useDatabaseUrl: {
        value: false
      },
      databaseUrl: {
        value: ""
      },
      databaseUrlFieldType: {
        value: "str"
      },
      ssl: {
        value: false,
        required: true
      },
      sslFieldType: {
        value: "bool"
      },
      sslmode: {
        value: "disable"
      },
      sslmodeFieldType: {
        value: "str"
      },
      max: {
        value: 10,
        required: true
      },
      maxFieldType: {
        value: "num"
      },
      idle: {
        value: 10000,
        required: true
      },
      idleFieldType: {
        value: "num"
      },
      connectionTimeout: {
        value: 10000,
        required: true
      },
      connectionTimeoutFieldType: {
        value: "num"
      },
      statementTimeout: {
        value: 0
      },
      statementTimeoutFieldType: {
        value: "num"
      }
    },
    label: function () {
      if (!this.name) {
        this.name = `${this.user}@${this.host}:${this.port}/${this.database}`;
      }
      return this.name;
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      const tabs = RED.tabs.create({
        id: "postgrestor-config-tabs",
        onchange: function (tab) {
          $("#postgrestor-config-tabs-content").children().hide();
          $("#" + tab.id).show();
        }
      });
      tabs.addTab({
        id: "postgrestor-config-tab-connection",
        label: this._('postgres.tab.connection')
      });
      tabs.addTab({
        id: "postgrestor-config-tab-security",
        label: this._('postgres.tab.security')
      });
      tabs.addTab({
        id: "postgrestor-config-tab-pool",
        label: this._('postgres.tab.pool')
      });
      $("#node-config-input-host").typedInput({
        default: 'str',
        types: ['str', 'flow', 'global', 'env'],
        typeField: $("#node-config-input-hostFieldType")
      });
      $("#node-config-input-port").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global', 'env'],
        typeField: $("#node-config-input-portFieldType")
      });
      $("#node-config-input-database").typedInput({
        default: 'str',
        types: ['str', 'flow', 'global', 'env'],
        typeField: $("#node-config-input-databaseFieldType")
      });
      $("#node-config-input-databaseUrl").typedInput({
        default: 'str',
        types: ['str', 'flow', 'global', 'env'],
        typeField: $("#node-config-input-databaseUrlFieldType")
      });
      $("#node-config-input-max").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global'],
        typeField: $("#node-config-input-maxFieldType")
      });
      $("#node-config-input-min").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global'],
        typeField: $("#node-config-input-minFieldType")
      });
      $("#node-config-input-idle").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global'],
        typeField: $("#node-config-input-idleFieldType")
      });
      $("#node-config-input-connectionTimeout").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global'],
        typeField: $("#node-config-input-connectionTimeoutFieldType")
      });
      $("#node-config-input-statementTimeout").typedInput({
        default: 'num',
        types: ['num', 'flow', 'global'],
        typeField: $("#node-config-input-statementTimeoutFieldType")
      });

      // Database Source radio toggle
      const toggleFields = function () {
        if ($("#postgrestor-dbsource-url").is(":checked")) {
          $("#postgrestor-manual-fields").hide();
          $("#postgrestor-databaseUrl-row").show();
        } else {
          $("#postgrestor-manual-fields").show();
          $("#postgrestor-databaseUrl-row").hide();
        }
      };
      $("input[name='databaseSource']").on('change', toggleFields);

      // sslmode progressive disclosure
      const sslmodeToggleCerts = function () {
        const mode = $("#node-config-input-sslmode").val();
        if (mode === 'verify-ca' || mode === 'verify-full') {
          $("#postgrestor-ssl-cert-fields").show();
        } else {
          $("#postgrestor-ssl-cert-fields").hide();
        }
      };
      $("#node-config-input-sslmode").on('change', sslmodeToggleCerts);

      // SSL migration: show deprecated checkbox if legacy ssl was true
      if (this.ssl === true || this.ssl === 'true') {
        if (!this.sslmode || this.sslmode === 'disable') {
          $("#node-config-input-sslmode").val('require');
        }
        $("#postgrestor-ssl-deprecated-row").show();
      }

      // Set initial radio button state from useDatabaseUrl
      if (this.useDatabaseUrl === true || this.useDatabaseUrl === 'true') {
        $("#postgrestor-dbsource-url").prop('checked', true);
        $("#postgrestor-dbsource-manual").prop('checked', false);
      }

      // Trigger visibility on initial load
      toggleFields();
      sslmodeToggleCerts();
    },
     credentials: {
      user: { type: 'text' },
      password: { type: 'password' },
      sslCa: { type: 'password' },
      sslCert: { type: 'password' },
      sslKey: { type: 'password' },
    },

  });
</script>
<script type="text/x-red" data-help-name="PostgresDBNode">
    <h3>PostgresDBNode — PostgreSQL Configuration</h3>
    <p>A <b>configuration node</b> that manages a connection pool to a PostgreSQL database. Other nodes (PostgresNode, PostgresListenerNode) reference this config to share connections.</p>
    <h4>Connection</h4>
    <dl>
      <dt><b>Name</b></dt><dd>Label for this config node. Defaults to <code>user@host:port/database</code>.</dd>
      <dt><b>Database Source</b></dt><dd><b>Manual</b>: enter host/port/database individually. <b>DATABASE_URL</b>: use a PostgreSQL connection string like <code>postgresql://user:pass@host:5432/db</code>.</dd>
      <dt><b>Host</b></dt><dd>PostgreSQL server hostname or IP address.</dd>
      <dt><b>Port</b></dt><dd>PostgreSQL server port (default: 5432).</dd>
      <dt><b>Database</b></dt><dd>Database name to connect to.</dd>
      <dt><b>SSL Mode</b></dt><dd>TLS/SSL mode for encrypted connections: <b>disable</b> (no encryption), <b>require</b> (SSL required, cert not verified), <b>verify-ca</b> (verify server cert against CA), <b>verify-full</b> (verify cert AND hostname).</dd>
    </dl>
    <h4>Security</h4>
    <dl>
      <dt><b>User</b></dt><dd>Database username.</dd>
      <dt><b>Password</b></dt><dd>Database password (stored as a Node-RED credential).</dd>
      <dt><b>SSL CA Certificate</b></dt><dd>PEM content of the Certificate Authority cert (required for verify-ca/verify-full).</dd>
      <dt><b>SSL Client Certificate</b></dt><dd>PEM content of the client certificate for mutual TLS.</dd>
      <dt><b>SSL Client Key</b></dt><dd>PEM content of the client private key (stored as a Node-RED credential).</dd>
    </dl>
    <h4>Pool</h4>
    <dl>
      <dt><b>Maximum size</b></dt><dd>Max connections in the pool (default: 10).</dd>
      <dt><b>Minimum size</b></dt><dd>Min idle connections kept open (default: 1).</dd>
      <dt><b>Idle Timeout</b></dt><dd>Milliseconds before an idle connection is closed (default: 10000).</dd>
      <dt><b>Connection Timeout</b></dt><dd>Milliseconds to wait for a new connection before failing (default: 10000).</dd>
      <dt><b>Statement Timeout</b></dt><dd>Default query timeout in ms for all nodes using this config. 0 = no timeout.</dd>
    </dl>
    <h4>Status Badge</h4>
    <p>The node badge shows pool health: <code>Active: X / Idle: Y / Waiting: Z / Total: T</code>. Updated every 30 seconds.</p>
</script>
